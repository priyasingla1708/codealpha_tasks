<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <h1 class="title">Calculation Pad</h1>
    <div class="calculator">
        <input class="display" id="display" disabled placeholder="0">
        <div class="buttons">
        <button class="leftbtn" onclick="press('7')">7</button>
        <button class="leftbtn" onclick="press('8')">8</button>
        <button class="leftbtn" onclick="press('9')">9</button>
        <button class="specialbtn" onclick="press('/')">÷</button>
        <button  class="leftbtn" onclick="press('4')">4</button>
        <button class="leftbtn" onclick="press('5')">5</button>
        <button class="leftbtn" onclick="press('6')">6</button>
        <button class="specialbtn" onclick="press('*')">×</button>
        <button class="leftbtn" onclick="press('1')">1</button>
        <button class="leftbtn" onclick="press('2')">2</button>
        <button class="leftbtn" onclick="press('3')">3</button>
        <button class="specialbtn" onclick="press('-')">-</button>
        <button class="leftbtn" onclick="press('0')">0</button>
        <button class="leftbtn" onclick="press('.')">.</button>
        <button  class="specialbtn" onclick="calculate()">=</button>
        <button class="specialbtn" onclick="press('+')">+</button>
        <button  class="clear" onclick="cleardisplay()">Clear</button>
        </div>
    </div>
   <script src="script2.js"></script>
</body>
</html>
